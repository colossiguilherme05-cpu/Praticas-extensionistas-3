<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body>

    <div class="container">
        <h2>Login</h2>
        <form method="post"> 
            {% csrf_token %} 
            {{ form.as_p }}

            <button type="submit">Entrar</button>
        </form>

        <p style="text-align:center; margin-top:10px;">
         <a href="{% url 'cadastro' %}">Criar conta</a> 
        </p>
    </div>
</body>

</html>
