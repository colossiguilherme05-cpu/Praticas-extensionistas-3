{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Editar Solicitação</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

{% if messages %}
    {% for message in messages %}
        <div class="mensagem {{ message.tags }}">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<div class="container">

<h2>Editar Status da Solicitação</h2>

<p>Paciente: {{ solicitacao.id_pac.nome_pac }}</p>
<p>Data: {{ solicitacao.data_solic }}</p>

<form method="post">
    {% csrf_token %}

    <label>Status:</label>
    <select name="status_solic">
        <option value="PENDENTE">Pendente</option>
        <option value="APROVADA">Aprovada</option>
        <option value="CANCELADA">Cancelada</option>
    </select>

    <button type="submit">Salvar</button>
</form>

<br>
<a href="{% url 'listar_solicitacoes_med' %}">Voltar</a>

</div>

</body>
</html>
