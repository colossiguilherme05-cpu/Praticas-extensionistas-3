<!DOCTYPE html>
<html>
<head>
    <title>Consulta</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

{% if messages %}
    {% for message in messages %}
        <div class="mensagem {{ message.tags }}">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<div class="container">
    <h2>Cadastro de Consulta</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Salvar</button>
        
    </form>

<br>

<a href="{% url 'dashboard' %}" class="btn-voltar">← Voltar</a>

</div>

</body>
</html>
