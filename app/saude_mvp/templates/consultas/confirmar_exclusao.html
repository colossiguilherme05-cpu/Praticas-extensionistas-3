{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Excluir Consulta</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

<div class="container">

    <h2>Excluir Consulta</h2>

    <p>Tem certeza que deseja excluir esta consulta?</p>

    <p>
        <strong>Paciente:</strong> {{ consulta.id_pac }}<br>
        <strong>Data:</strong> {{ consulta.data_con }}<br>
        <strong>Hora:</strong> {{ consulta.hora_con }}
    </p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Excluir</button>
    </form>

    <br>

    <a href="{% url 'listar_consultas' %}">Cancelar</a>

</div>

</body>
</html>
